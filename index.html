<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Cetech Sistemas</title>
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <img src="./img/LOGO FINALIZADA OK.jpg" class="logo" />

    <h2 class="inicial">Cetech Sistemas</h2>

    <div class="resumo">
      <h3 id="totalVenda">💰 Total vendido: R$ 0.00</h3>
      <h3 id="totalCusto">💸 Total custo: R$ 0.00</h3>
      <h3 id="lucroTotal">🟢 Lucro líquido: R$ 0.00</h3>
    </div>

    <div class="container">
      <div class="form">
        <input id="nome" placeholder="Cliente" />
        <input id="sistema" placeholder="Sistema" />
        <input id="custo" placeholder="Custo" type="number" />
        <input id="venda" placeholder="Venda" type="number" />
        <input id="gdoor" placeholder="Venc. Gdoor" type="number" />
        <input id="cetech" placeholder="Venc. Cetech" type="number" />

        <button class="salvar" onclick="salvar()">Salvar</button>
      </div>

      <input
        id="busca"
        placeholder="🔎 Buscar cliente..."
        oninput="filtrar()"
      />

      <div id="lista"></div>
    </div>

    <script>
      let editandoId = null;

      function filtrar() {
        const termo = document.getElementById("busca").value.toLowerCase();
        const cards = document.querySelectorAll(".card");

        cards.forEach((card) => {
          const nome = card.querySelector("h3").innerText.toLowerCase();
          card.style.display = nome.includes(termo) ? "block" : "none";
        });
      }

      function calcularDias(dia) {
        const diaNum = Number(dia);

        if (!diaNum) return "-";

        const hoje = new Date().getDate();
        let diff = diaNum - hoje;

        if (diff < 0) diff += 30;

        if (diff === 0) return "vence hoje";

        return diff + " dias";
      }

      function salvar() {
        const gdoorVal = document.getElementById("gdoor").value;
        const cetechVal = document.getElementById("cetech").value;

        const dados = {
          nome: document.getElementById("nome").value,
          sistema: document.getElementById("sistema").value,
          custo: parseFloat(document.getElementById("custo").value) || 0,
          venda: parseFloat(document.getElementById("venda").value) || 0,

          // ✅ corrigido
          dia_vencimento_gdoor: gdoorVal ? parseInt(gdoorVal) : null,
          dia_vencimento_cetech: cetechVal ? parseInt(cetechVal) : null,
        };

        const url = editandoId
          ? `http://localhost:3000/clientes/${editandoId}`
          : `http://localhost:3000/clientes`;

        const metodo = editandoId ? "PUT" : "POST";

        fetch(url, {
          method: metodo,
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(dados),
        }).then(() => {
          limpar();
          editandoId = null;
          carregar();
        });
      }

      function excluir(id) {
        fetch(`http://localhost:3000/clientes/${id}`, {
          method: "DELETE",
        }).then(() => carregar());
      }

      function editar(c) {
        document.getElementById("nome").value = c.nome;
        document.getElementById("sistema").value = c.sistema;
        document.getElementById("custo").value = c.custo;
        document.getElementById("venda").value = c.venda;
        document.getElementById("gdoor").value = c.dia_vencimento_gdoor || "";
        document.getElementById("cetech").value = c.dia_vencimento_cetech || "";

        editandoId = c.id;
      }

      function limpar() {
        document.getElementById("nome").value = "";
        document.getElementById("sistema").value = "";
        document.getElementById("custo").value = "";
        document.getElementById("venda").value = "";
        document.getElementById("gdoor").value = "";
        document.getElementById("cetech").value = "";
      }

      function carregar() {
        fetch("http://localhost:3000/clientes")
          .then((res) => res.json())
          .then((clientes) => {
            const lista = document.getElementById("lista");

            const totalVendaEl = document.getElementById("totalVenda");
            const totalCustoEl = document.getElementById("totalCusto");
            const lucroTotalEl = document.getElementById("lucroTotal");

            lista.innerHTML = "";

            let totalVenda = 0;
            let totalCusto = 0;

            clientes.forEach((c) => {
              const venda = Number(c.venda) || 0;
              const custo = Number(c.custo) || 0;
              const lucro = venda - custo;

              totalVenda += venda;
              totalCusto += custo;

              const diasG = calcularDias(c.dia_vencimento_gdoor);
              const diasC = calcularDias(c.dia_vencimento_cetech);

              const card = document.createElement("div");
              card.className = "card";

              card.innerHTML = `
                <h3>${c.nome}</h3>
                <p>${c.sistema}</p>
                <p>💰 Venda: R$ ${venda.toFixed(2)}</p>
                <p>💸 Custo: R$ ${custo.toFixed(2)}</p>
                <p>🟢 Lucro: R$ ${lucro.toFixed(2)}</p>

                <p>📅 Gdoor: ${
                  c.dia_vencimento_gdoor || "Não definido"
                } (${diasG})</p>

                <p>📅 Cetech: ${
                  c.dia_vencimento_cetech || "Não definido"
                } (${diasC})</p>

                <button class="editar">Editar</button>
                <button class="excluir">Excluir</button>
              `;

              card.querySelector(".editar").onclick = () => editar(c);
              card.querySelector(".excluir").onclick = () => excluir(c.id);

              lista.appendChild(card);
            });

            const lucroTotal = totalVenda - totalCusto;

            totalVendaEl.innerText = `💰 Total vendido: R$ ${totalVenda.toFixed(
              2,
            )}`;
            totalCustoEl.innerText = `💸 Total custo: R$ ${totalCusto.toFixed(
              2,
            )}`;
            lucroTotalEl.innerText = `🟢 Lucro líquido: R$ ${lucroTotal.toFixed(
              2,
            )}`;
          });
      }

      // ✅ ESSENCIAL (faltava isso)
      carregar();
    </script>
  </body>
</html>
